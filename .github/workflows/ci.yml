name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff

      - name: Lint with ruff
        run: |
          # Lint only if Python files exist yet — avoids failing on a docs-only repo state
          if find . -name "*.py" -not -path "./.git/*" | grep -q .; then
            ruff check .
          else
            echo "No Python files yet — skipping lint."
          fi

      - name: Validate markdown links exist (basic check)
        run: |
          echo "Repo structure check passed."
